language: node_js
cache:
  directories:
    - ~/.npm
node_js:
  - '12'
git:
  depth: 3
deploy:
  provider: pages
  edge: true
  keep-history: true
  github-token: $GITHUB_TOKEN
  local-dir: public/
  target-branch: gh-pages
  commit_message: 'Deploy Release'
  on:
    branch: master
